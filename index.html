<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>词汇地牢 — 背单词闯关</title>
    <meta name="description" content="背单词与地牢闯关结合的游戏。答对单词击败怪物，不断深入地下城！">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:#0a0a12;color:#e0dcd0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
            min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
            overflow:hidden;user-select:none
        }

        /* ===== GAME CONTAINER ===== */
        #game{
            width:100%;max-width:520px;height:100vh;max-height:780px;
            background:linear-gradient(180deg,#141420 0%,#1a1a2e 40%,#0f0f1a 100%);
            border-radius:0;overflow:hidden;position:relative;
            display:flex;flex-direction:column;
            box-shadow:0 0 60px rgba(108,92,231,.08);
        }
        @media(min-width:560px){#game{border-radius:20px;height:92vh;margin:4vh auto}}

        /* ===== TOP HUD ===== */
        .hud{
            padding:12px 16px 8px;display:flex;justify-content:space-between;align-items:center;
            background:rgba(0,0,0,.4);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0
        }
        .hud-floor{font-size:14px;font-weight:700;color:#a29bfe}
        .hud-floor span{color:#e0dcd0}
        .hud-hearts{display:flex;gap:2px;font-size:18px}
        .hud-hearts .lost{opacity:.25}
        .hud-timer{display:flex;align-items:center;gap:4px;font-size:14px;font-weight:700}
        .hud-timer.danger{color:#ef4444;animation:blink .6s infinite}
        .hud-score{font-size:13px;color:#fbbf24;font-weight:600}

        @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

        /* ===== ARENA ===== */
        .arena{
            flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
            padding:10px 16px 8px;position:relative;overflow:hidden;min-height:0
        }

        /* Background decorations */
        .arena::before{
            content:'';position:absolute;bottom:0;left:0;right:0;height:40%;
            background:repeating-linear-gradient(90deg,transparent,transparent 24px,rgba(255,255,255,.02) 24px,rgba(255,255,255,.02) 25px);
            pointer-events:none
        }
        .arena::after{
            content:'';position:absolute;top:10%;left:10%;right:10%;height:2px;
            background:radial-gradient(ellipse, rgba(162,155,254,.12) 0%,transparent 70%);
            pointer-events:none
        }

        /* ===== BATTLE ZONE ===== */
        .battle-zone{
            display:flex;align-items:center;justify-content:space-around;
            width:100%;max-width:380px;flex-shrink:0;margin-bottom:6px
        }
        .fighter{font-size:64px;transition:transform .15s;position:relative;line-height:1}
        .fighter.player{filter:drop-shadow(0 0 12px rgba(108,92,231,.4))}
        .fighter.enemy{filter:drop-shadow(0 0 12px rgba(239,68,68,.3))}
        .fighter.attack-left{animation:swing .35s ease}
        .fighter.hit-right{animation:takeHit .35s ease}
        .fighter.dodge{animation:dodge .4s ease}
        .fighter.dead{opacity:0;transform:scale(0);transition:all .4s}

        @keyframes swing{0%{transform:rotate(-5deg)}50%{transform:rotate(15deg)translateX(12px)}100%{transform:rotate(0deg)}}
        @keyframes takeHit{0%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}100%{transform:translateX(0)}}
        @keyframes dodge{0%{transform:translateY(0)}30%{transform:translateY(-20px)}60%{transform:translateY(-20px)}100%{transform:translateY(0)}}

        .enemy-hp-bar{
            position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);
            width:48px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden
        }
        .enemy-hp-fill{height:100%;background:#ef4444;border-radius:2px;transition:width .3s}

        .battle-label{
            font-size:11px;text-align:center;margin-top:2px;color:var(--tc2,#7a7a8a)
        }

        /* ===== DAMAGE NUMBER ===== */
        .dmg-num{
            position:absolute;font-size:28px;font-weight:900;pointer-events:none;z-index:10;animation:dmgFloat 1s forwards
        }
        .dmg-num.damage{color:#ef4444}
        .dmg-num.heal{color:#10b981}
        .dmg-num.bonus{color:#fbbf24}
        @keyframes dmgFloat{0%{opacity:1;transform:translateY(0)scale(1)}100%{opacity:0;transform:translateY(-50px)scale(1.4)}}

        /* ===== WORD CARD ===== */
        .word-card{
            width:100%;max-width:380px;background:rgba(255,255,255,.04);
            border:1px solid rgba(255,255,255,.08);border-radius:14px;
            padding:12px 16px 14px;text-align:center;flex-shrink:0;margin-bottom:6px
        }
        .word-card .en{font-size:20px;font-weight:800;letter-spacing:-.3px;color:#fff}
        .word-card .ipa{font-size:12px;color:#7a7a8a;margin-top:2px}

        /* ===== OPTIONS ===== */
        .options{
            display:grid;grid-template-columns:1fr 1fr;gap:8px;
            width:100%;max-width:380px;flex-shrink:0;margin-bottom:6px
        }
        .opt-btn{
            padding:12px 8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);
            color:#e0dcd0;border-radius:10px;font-size:15px;cursor:pointer;
            transition:all .12s;font-weight:500;text-align:center;font-family:inherit
        }
        .opt-btn:hover{background:rgba(108,92,231,.15);border-color:#6c5ce7;transform:translateY(-1px)}
        .opt-btn:active{transform:scale(.96)}
        .opt-btn.disabled{pointer-events:none;opacity:.5}
        .opt-btn.correct{background:rgba(16,185,129,.2);border-color:#10b981;color:#10b981;animation:pop .25s}
        .opt-btn.wrong{background:rgba(239,68,68,.2);border-color:#ef4444;color:#ef4444;animation:shake .25s}
        @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
        @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}

        /* ===== ITEMS BAR ===== */
        .items-bar{
            display:flex;gap:8px;padding:6px 16px;flex-shrink:0;justify-content:center;
            background:rgba(0,0,0,.2);border-top:1px solid rgba(255,255,255,.05);flex-wrap:wrap
        }
        .item-slot{
            width:44px;height:44px;border:1px solid rgba(255,255,255,.08);border-radius:10px;
            display:flex;align-items:center;justify-content:center;font-size:20px;
            background:rgba(255,255,255,.03);cursor:pointer;transition:all .15s;position:relative
        }
        .item-slot:hover{border-color:#6c5ce7;background:rgba(108,92,231,.1);transform:translateY(-2px)}
        .item-slot:active{transform:scale(.92)}
        .item-slot.empty{opacity:.2;cursor:default;pointer-events:none}
        .item-slot .badge{
            position:absolute;top:-5px;right:-5px;background:#6c5ce7;color:#fff;
            border-radius:10px;font-size:10px;font-weight:700;padding:1px 5px;line-height:1.3
        }
        .item-slot .tooltip{
            position:absolute;bottom:50px;left:50%;transform:translateX(-50%);
            background:#1a1a2e;border:1px solid rgba(255,255,255,.1);border-radius:6px;
            padding:4px 10px;font-size:11px;white-space:nowrap;color:#e0dcd0;
            display:none;pointer-events:none;z-index:20
        }
        .item-slot:hover .tooltip{display:block}
        .items-label{font-size:11px;color:#7a7a8a;display:flex;align-items:center;gap:4px}

        /* ===== OVERLAY ===== */
        .overlay{
            position:absolute;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);
            display:none;flex-direction:column;align-items:center;justify-content:center;
            z-index:50;padding:24px;
        }
        .overlay.active{display:flex}
        .overlay .title{font-size:32px;font-weight:800;margin-bottom:4px}
        .overlay .sub{font-size:15px;color:#7a7a8a;margin-bottom:16px;text-align:center;line-height:1.5}
        .overlay .big-emoji{font-size:72px;margin-bottom:12px}
        .overlay .stat-row{display:flex;gap:24px;margin-bottom:20px;flex-wrap:wrap;justify-content:center}
        .overlay .stat-item{text-align:center}
        .overlay .stat-item .num{font-size:28px;font-weight:800;color:#a29bfe}
        .overlay .stat-item .lbl{font-size:12px;color:#7a7a8a}
        .overlay .btn{
            padding:14px 40px;border:none;border-radius:12px;font-size:16px;font-weight:700;
            cursor:pointer;transition:opacity .2s;font-family:inherit
        }
        .overlay .btn:hover{opacity:.85}
        .overlay .btn-primary{background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff}
        .overlay .btn-secondary{background:rgba(255,255,255,.08);color:#e0dcd0;border:1px solid rgba(255,255,255,.1)}

        /* ===== ITEM DROP ANIMATION ===== */
        .item-drop{
            position:absolute;font-size:36px;pointer-events:none;z-index:15;animation:dropAnim 1.2s forwards
        }
        @keyframes dropAnim{
            0%{opacity:1;transform:translateY(0)scale(.5)}
            40%{opacity:1;transform:translateY(-30px)scale(1.2)}
            100%{opacity:0;transform:translateY(-80px)scale(.6)}
        }

        /* ===== TIMER BAR ===== */
        .timer-bar-wrap{
            width:100%;max-width:380px;height:4px;background:rgba(255,255,255,.06);border-radius:2px;
            margin-bottom:6px;flex-shrink:0;overflow:hidden
        }
        .timer-bar-fill{
            height:100%;border-radius:2px;transition:width .3s linear;
            background:linear-gradient(90deg,#6c5ce7,#a29bfe)
        }
        .timer-bar-fill.danger{background:linear-gradient(90deg,#ef4444,#f97316)}
        .timer-bar-fill.safe{background:linear-gradient(90deg,#10b981,#34d399)}

        /* ===== FLOOR BANNER ===== */
        .floor-banner{
            position:absolute;inset:0;display:none;flex-direction:column;
            align-items:center;justify-content:center;z-index:40;pointer-events:none
        }
        .floor-banner.active{display:flex}
        .floor-banner .txt{
            font-size:48px;font-weight:900;background:linear-gradient(180deg,#a29bfe,#6c5ce7);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;
            animation:bannerIn .6s forwards
        }
        .floor-banner .sub{
            font-size:16px;color:#7a7a8a;margin-top:4px;animation:bannerIn .6s .2s forwards;opacity:0
        }
        @keyframes bannerIn{0%{opacity:0;transform:scale(.6)translateY(20px)}100%{opacity:1;transform:scale(1)translateY(0)}}

        /* ===== MOBILE ===== */
        @media(max-height:640px){
            .fighter{font-size:48px}
            .word-card .en{font-size:17px}
            .word-card{padding:8px 12px 10px}
            .opt-btn{padding:10px 6px;font-size:14px}
            .hud{padding:8px 12px 6px}
            .hud-hearts{font-size:15px}
        }
        @media(max-height:560px){
            .fighter{font-size:36px}
            .word-card .en{font-size:15px}
            .word-card .ipa{font-size:10px}
            .opt-btn{padding:7px 4px;font-size:13px}
            .arena{padding:4px 12px 4px}
            .word-card{padding:5px 10px 6px}
        }
        @media(max-width:400px){
            .fighter{font-size:52px}
            #game{max-width:100%}
        }
    </style>
</head>
<body>
<div id="game">
    <!-- HUD -->
    <div class="hud">
        <div class="hud-floor">🏰 <span id="floor-num">1</span>层</div>
        <div class="hud-hearts" id="hearts"></div>
        <div class="hud-score" id="score-display">💰 0</div>
        <div class="hud-timer" id="timer-display">⏱ <span id="timer-num">15</span>s</div>
    </div>

    <!-- ARENA -->
    <div class="arena" id="arena">
        <div class="battle-zone">
            <div class="fighter player" id="player">⚔️</div>
            <div class="fighter enemy" id="enemy" style="position:relative">
                👹
                <div class="enemy-hp-bar"><div class="enemy-hp-fill" id="enemy-hp" style="width:100%"></div></div>
            </div>
        </div>

        <!-- Timer bar -->
        <div class="timer-bar-wrap"><div class="timer-bar-fill" id="timer-bar"></div></div>

        <!-- Word card -->
        <div class="word-card">
            <div class="en" id="word-en">abandon</div>
            <div class="ipa" id="word-ipa">/əˈbændən/</div>
        </div>

        <!-- Options -->
        <div class="options" id="options"></div>
    </div>

    <!-- Items bar -->
    <div class="items-bar" id="items-bar">
        <span class="items-label">🎒</span>
        <div class="item-slot empty" id="item-1"><div class="tooltip"></div></div>
        <div class="item-slot empty" id="item-2"><div class="tooltip"></div></div>
        <div class="item-slot empty" id="item-3"><div class="tooltip"></div></div>
    </div>

    <!-- Floor banner -->
    <div class="floor-banner" id="floor-banner">
        <div class="txt" id="banner-txt">第 1 层</div>
        <div class="sub" id="banner-sub">⚔️ 前进！</div>
    </div>

    <!-- Game Over overlay -->
    <div class="overlay" id="overlay-gameover">
        <div class="big-emoji">💀</div>
        <div class="title" style="color:#ef4444">你倒下了</div>
        <div class="sub">深入地下城 <strong id="go-floor">5</strong> 层 · 答对 <strong id="go-correct">0</strong> 题</div>
        <div class="stat-row">
            <div class="stat-item"><div class="num" id="go-score">0</div><div class="lbl">得分</div></div>
            <div class="stat-item"><div class="num" id="go-accuracy">0%</div><div class="lbl">正确率</div></div>
            <div class="stat-item"><div class="num" id="go-streak">🔥0</div><div class="lbl">最高连击</div></div>
        </div>
        <button class="btn btn-primary" onclick="restartGame()">🔄 重新挑战</button>
    </div>

    <!-- Victory overlay -->
    <div class="overlay" id="overlay-victory">
        <div class="big-emoji">🏆</div>
        <div class="title" style="color:#fbbf24">通关成功！</div>
        <div class="sub">你征服了地下城！</div>
        <div class="stat-row">
            <div class="stat-item"><div class="num" id="v-score">0</div><div class="lbl">最终得分</div></div>
            <div class="stat-item"><div class="num" id="v-accuracy">0%</div><div class="lbl">正确率</div></div>
            <div class="stat-item"><div class="num" id="v-streak">🔥0</div><div class="lbl">最高连击</div></div>
        </div>
        <button class="btn btn-primary" onclick="restartGame()">🔄 再来一次</button>
    </div>
</div>

<script>
// ============================================================
//  WORD BANK
// ============================================================

// ============================================================
//  GAME STATE
// ============================================================
const ENEMIES = ['👹','🐉','👾','🧟','🐺','🕷️','👻','🐍','🤖','🧛','🦅','🧌'];
const ITEMS = [
    {id:'heal',name:'❤️ 治疗',desc:'回复 1 点生命',icon:'❤️',effect:healEffect},
    {id:'time',name:'⏰ 延时',desc:'增加 8 秒',icon:'⏰',effect:timeEffect},
    {id:'fifty',name:'💡 明灯',desc:'去除两个错误答案',icon:'💡',effect:fiftyEffect},
    {id:'skip',name:'⚡ 跳过',desc:'直接跳到下一题',icon:'⚡',effect:skipEffect},
];
const MAX_HP = 5;
const TOTAL_FLOORS = 20;
const BASE_TIME = 15;
const ITEM_DROP_CHANCE = 0.25;

let state = {};
let timerInterval = null;

// ===== DOM =====
const $ = id => document.getElementById(id);
const heartsEl = $('hearts');
const floorNum = $('floor-num');
const scoreDisplay = $('score-display');
const timerNum = $('timer-num');
const timerBar = $('timer-bar');
const wordEn = $('word-en');
const wordIpa = $('word-ipa');
const optionsEl = $('options');
const playerEl = $('player');
const enemyEl = $('enemy');
const enemyHp = $('enemy-hp');
const arena = $('arena');
const itemsBar = $('items-bar');

// ===== START =====
function restartGame(){
    state = {
        floor:0, hp:MAX_HP, maxHp:MAX_HP, score:0,
        correct:0, wrong:0, streak:0, maxStreak:0,
        items:[], frozen:false, usedWords:[],
        isGameOver:false, enemyHp:1, totalAnswered:0
    };
    document.getElementById('overlay-gameover').classList.remove('active');
    document.getElementById('overlay-victory').classList.remove('active');
    clearItems();
    updateHUD();
    nextFloor();
}

function clearItems(){
    state.items = [];
    for(let i=1;i<=3;i++){
        const slot = document.getElementById('item-'+i);
        slot.className='item-slot empty'; slot.innerHTML='<div class="tooltip"></div>';
    }
}

function updateHUD(){
    // Hearts
    let h='';
    for(let i=0;i<state.maxHp;i++) h+= i<state.hp ? '❤️' : '<span class="lost">🖤</span>';
    heartsEl.innerHTML = h;

    floorNum.textContent = state.floor;
    scoreDisplay.textContent = '💰 '+state.score;
}

// ===== FLOOR =====
function nextFloor(){
    state.floor++;
    updateHUD();

    // Check victory
    if(state.floor > TOTAL_FLOORS){
        victory();
        return;
    }

    // Show floor banner
    const banner = document.getElementById('floor-banner');
    document.getElementById('banner-txt').textContent = '第 '+state.floor+' 层';
    const flavor = ['⚔️ 前进！','💀 危险逼近…','🔥 越来越深了','🌑 黑暗笼罩','💪 坚持住！','🌀 地牢深处…'];
    document.getElementById('banner-sub').textContent = flavor[(state.floor-1)%flavor.length];
    banner.classList.add('active');
    setTimeout(()=>banner.classList.remove('active'), 1200);

    // Reset enemy visual
    enemyEl.className = 'fighter enemy';
    enemyEl.textContent = ENEMIES[(state.floor-1) % ENEMIES.length];
    enemyHp.style.width = '100%';
    playerEl.className = 'fighter player';

    // Question bank: get words not used recently
    let bank = WORDS.filter(w => !state.usedWords.includes(w.en));
    if(bank.length < 10) state.usedWords = [];
    bank = WORDS.filter(w => !state.usedWords.includes(w.en));
    const word = bank[Math.floor(Math.random()*bank.length)];
    state.usedWords.push(word.en);
    state.currentWord = word;

    wordEn.textContent = word.en;
    wordIpa.textContent = word.ipa;

    // Generate options
    let distractors = WORDS
        .filter(w => w.cn !== word.cn)
        .sort(()=>Math.random()-.5)
        .slice(0,3)
        .map(w=>w.cn);
    while(distractors.length<3) distractors.push('未知释义');
    const opts = [word.cn, ...distractors].sort(()=>Math.random()-.5);
    state.correctAnswer = word.cn;
    state.currentOptions = opts;
    state.fiftyUsed = false;

    optionsEl.innerHTML = '';
    opts.forEach(opt=>{
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.textContent = opt;
        btn.addEventListener('click',()=>answer(btn,opt));
        optionsEl.appendChild(btn);
    });

    // Start timer
    startTimer(BASE_TIME);
}

// ===== TIMER =====
function startTimer(secs){
    clearInterval(timerInterval);
    state.timeLeft = secs;
    timerNum.textContent = state.timeLeft;
    timerBar.style.width = '100%';
    timerBar.className = 'timer-bar-fill safe';
    updateTimerColor();

    timerInterval = setInterval(()=>{
        if(state.isGameOver) return;
        if(state.frozen) return;
        state.timeLeft--;
        timerNum.textContent = state.timeLeft;
        const pct = (state.timeLeft / secs) * 100;
        timerBar.style.width = Math.max(0,pct)+'%';
        updateTimerColor();
        if(state.timeLeft <= 0){
            // Time's up = wrong answer
            clearInterval(timerInterval);
            handleWrong(null);
        }
    },1000);
}

function updateTimerColor(){
    timerBar.className = 'timer-bar-fill';
    if(state.timeLeft <= 4) timerBar.classList.add('danger');
    else if(state.timeLeft <= 8) timerBar.classList.add('safe');
    else timerBar.classList.add('safe');
    if(state.timeLeft <= 4){
        document.querySelector('.hud-timer').classList.add('danger');
    } else {
        document.querySelector('.hud-timer').classList.remove('danger');
    }
}

// ===== ANSWER =====
function answer(btn, chosen){
    if(state.isGameOver) return;
    const btns = optionsEl.querySelectorAll('.opt-btn');
    btns.forEach(b=>b.classList.add('disabled'));

    if(chosen === state.correctAnswer){
        btn.classList.add('correct');
        handleCorrect();
    } else {
        btn.classList.add('wrong');
        btns.forEach(b=>{if(b.textContent===state.correctAnswer)b.classList.add('correct')});
        handleWrong(btn);
    }
}

function handleCorrect(){
    clearInterval(timerInterval);
    state.correct++;
    state.streak++;
    state.totalAnswered++;
    if(state.streak > state.maxStreak) state.maxStreak = state.streak;

    // Score: base + time bonus + streak bonus
    let pts = 10 + Math.floor(state.timeLeft * 1.5);
    if(state.streak >= 3) pts += 5;
    if(state.streak >= 5) pts += 10;
    state.score += pts;

    // Animation: player attacks, enemy hit
    playerEl.className = 'fighter player attack-left';
    enemyEl.className = 'fighter enemy hit-right';
    showDmg('+'+pts+'💰', 'bonus', enemyEl);

    updateHUD();

    // Item drop chance
    if(Math.random() < ITEM_DROP_CHANCE){
        const item = ITEMS[Math.floor(Math.random()*ITEMS.length)];
        addItem(item);
        showItemDrop(item.icon);
    }

    // Check if enemy defeated (always 1HP per floor)
    setTimeout(()=>{
        enemyEl.className = 'fighter enemy dead';
        showDmg('💥', 'damage', enemyEl);
        setTimeout(()=>{
            enemyEl.className = 'fighter enemy';
            nextFloor();
        },500);
    },600);
}

function handleWrong(clickedBtn){
    clearInterval(timerInterval);
    state.wrong++;
    state.streak = 0;
    state.totalAnswered++;

    // Player takes damage
    state.hp--;
    updateHUD();

    // Animation: player hit
    playerEl.className = 'fighter player hit-right';
    enemyEl.className = 'fighter enemy';
    showDmg('-1 ❤️', 'damage', playerEl);

    // Check death
    if(state.hp <= 0){
        state.isGameOver = true;
        setTimeout(gameOver, 800);
        return;
    }

    setTimeout(()=>{
        playerEl.className = 'fighter player';
        // Continue to next floor (already took damage)
        enemyEl.className = 'fighter enemy dead';
        setTimeout(()=>{
            enemyEl.className = 'fighter enemy';
            nextFloor();
        },400);
    },700);
}

// ===== ITEMS =====
function addItem(item){
    // Find empty slot or replace worst item
    for(let i=0;i<3;i++){
        if(!state.items[i]){
            state.items[i] = {...item, count: 1};
            renderItems();
            showToast('🎁 获得 '+item.name);
            return;
        }
        if(state.items[i].id === item.id){
            state.items[i].count++;
            renderItems();
            showToast('🎁 '+item.name+' +1');
            return;
        }
    }
    // All slots full, replace first
    state.items[0] = {...item, count: 1};
    renderItems();
    showToast('🎁 获得 '+item.name);
}

function renderItems(){
    for(let i=0;i<3;i++){
        const slot = document.getElementById('item-'+(i+1));
        if(state.items[i]){
            slot.className = 'item-slot';
            const badge = state.items[i].count > 1 ? `<span class="badge">${state.items[i].count}</span>` : '';
            slot.innerHTML = `${state.items[i].icon}${badge}<div class="tooltip">${state.items[i].name}: ${state.items[i].desc}</div>`;
            slot.onclick = ()=>useItem(i);
        } else {
            slot.className = 'item-slot empty';
            slot.innerHTML = '<div class="tooltip"></div>';
            slot.onclick = null;
        }
    }
}

function useItem(idx){
    if(!state.items[idx]) return;
    state.items[idx].effect();
    state.items[idx].count--;
    if(state.items[idx].count <= 0) state.items[idx] = null;
    renderItems();
}

function healEffect(){
    if(state.hp < state.maxHp){
        state.hp++;
        showDmg('+1 ❤️', 'heal', playerEl);
        updateHUD();
        showToast('❤️ 回复 1 点生命');
    } else {
        showToast('❤️ 生命已满');
    }
}

function timeEffect(){
    state.timeLeft = Math.min(state.timeLeft + 8, 20);
    timerNum.textContent = state.timeLeft;
    updateTimerColor();
    showToast('⏰ 时间 +8 秒');
}

function fiftyEffect(){
    if(state.fiftyUsed) { showToast('💡 已经用过了'); return; }
    state.fiftyUsed = true;
    const btns = optionsEl.querySelectorAll('.opt-btn');
    let wrongs = [];
    btns.forEach(b=>{
        if(b.textContent !== state.correctAnswer) wrongs.push(b);
    });
    // Remove 2 wrong answers
    const shuffled = wrongs.sort(()=>Math.random()-.5);
    shuffled.slice(0,2).forEach(b=>{
        b.style.visibility = 'hidden';
        b.classList.add('disabled');
    });
    showToast('💡 去除了两个错误答案');
}

function skipEffect(){
    clearInterval(timerInterval);
    state.streak = 0;
    // Don't count as wrong or right
    showToast('⚡ 跳过此题');
    enemyEl.className = 'fighter enemy dead';
    setTimeout(()=>{
        enemyEl.className = 'fighter enemy';
        nextFloor();
    },400);
}

// ===== VISUAL EFFECTS =====
function showDmg(text, type, target){
    const el = document.createElement('div');
    el.className = 'dmg-num '+type;
    el.textContent = text;
    const rect = target.getBoundingClientRect();
    const arenaRect = arena.getBoundingClientRect();
    el.style.left = (rect.left - arenaRect.left + rect.width/2 - 20)+'px';
    el.style.top = (rect.top - arenaRect.top + 20)+'px';
    arena.appendChild(el);
    setTimeout(()=>el.remove(), 1000);
}

function showItemDrop(icon){
    const el = document.createElement('div');
    el.className = 'item-drop';
    el.textContent = icon;
    el.style.left = (40 + Math.random()*60)+'%';
    el.style.top = '40%';
    arena.appendChild(el);
    setTimeout(()=>el.remove(), 1200);
}

function showToast(msg){
    const existing = document.querySelector('.game-toast');
    if(existing) existing.remove();
    const el = document.createElement('div');
    el.className = 'game-toast';
    el.style.cssText = `
        position:absolute;bottom:60px;left:50%;transform:translateX(-50%);
        background:rgba(0,0,0,.8);color:#e0dcd0;padding:8px 18px;border-radius:8px;
        font-size:13px;z-index:30;animation:fadeToast 1.8s forwards;pointer-events:none;
        border:1px solid rgba(255,255,255,.08);white-space:nowrap
    `;
    el.textContent = msg;
    const style = document.createElement('style');
    if(!document.getElementById('toast-style')){
        style.id='toast-style';
        style.textContent='@keyframes fadeToast{0%{opacity:0;transform:translateX(-50%)translateY(10px)}15%{opacity:1;transform:translateX(-50%)translateY(0)}85%{opacity:1}100%{opacity:0}}';
        document.head.appendChild(style);
    }
    arena.appendChild(el);
    setTimeout(()=>el.remove(), 1900);
}

// ===== END =====
function gameOver(){
    document.getElementById('overlay-gameover').classList.add('active');
    document.getElementById('go-floor').textContent = state.floor;
    document.getElementById('go-correct').textContent = state.correct;
    document.getElementById('go-score').textContent = state.score;
    const rate = state.totalAnswered > 0 ? Math.round(state.correct/state.totalAnswered*100) : 0;
    document.getElementById('go-accuracy').textContent = rate+'%';
    document.getElementById('go-streak').textContent = '🔥'+state.maxStreak;
}

function victory(){
    document.getElementById('overlay-victory').classList.add('active');
    document.getElementById('v-score').textContent = state.score;
    const rate = state.totalAnswered > 0 ? Math.round(state.correct/state.totalAnswered*100) : 0;
    document.getElementById('v-accuracy').textContent = rate+'%';
    document.getElementById('v-streak').textContent = '🔥'+state.maxStreak;
}

// ===== START =====
restartGame();
</script>
</body>
