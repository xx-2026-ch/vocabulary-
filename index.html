<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>填词地牢 — 单词拼图闯关</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07070e;color:#e0dcd0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
#game{width:100%;max-width:500px;height:100vh;max-height:820px;background:linear-gradient(180deg,#12121f,#0a0a16);position:relative;display:flex;flex-direction:column;overflow:hidden}
@media(min-width:520px){#game{border-radius:16px;height:94vh;margin:3vh auto;box-shadow:0 0 80px rgba(108,92,231,.08)}}

/* ===== SCREENS ===== */
.screen{display:none;flex-direction:column;height:100%;width:100%;position:absolute;inset:0}
.screen.active{display:flex}

/* ===== START SCREEN ===== */
.start{align-items:center;justify-content:center;padding:24px;text-align:center;background:radial-gradient(ellipse at 50% 0%,rgba(108,92,231,.1),transparent 70%)}
.start .icon{font-size:80px;margin-bottom:8px;filter:drop-shadow(0 8px 32px rgba(108,92,231,.3));animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.start h1{font-size:40px;font-weight:900;background:linear-gradient(180deg,#a29bfe,#6c5ce7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.start .sub{font-size:14px;color:#7a7a8a;margin:2px 0 16px}
.start .info{display:flex;gap:20px;margin-bottom:24px;flex-wrap:wrap;justify-content:center}
.start .info .i{text-align:center}
.start .info .i .n{font-size:20px;font-weight:800;color:#a29bfe}
.start .info .i .l{font-size:11px;color:#7a7a8a;margin-top:1px}
.start .btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:240px}
.btn{padding:13px 0;border:none;border-radius:11px;font-size:16px;font-weight:700;cursor:pointer;transition:transform .1s,opacity .2s;font-family:inherit;width:100%}
.btn:active{transform:scale(.95)}
.btn-primary{background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-secondary{background:rgba(255,255,255,.06);color:#e0dcd0;border:1px solid rgba(255,255,255,.1)}
.btn-secondary:hover{background:rgba(255,255,255,.1)}

/* ===== HUD ===== */
.hud{padding:8px 14px 4px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.35);flex-shrink:0;flex-wrap:wrap;gap:4px}
.hud-lvl{font-size:13px;font-weight:700;color:#a29bfe}
.hud-lvl span{color:#e0dcd0}
.hud-hearts{display:flex;gap:2px;font-size:15px}
.hud-hearts .lost{opacity:.2}
.hud-coins{font-size:13px;color:#fbbf24;font-weight:700}
.hud-timer{font-size:13px;display:flex;align-items:center;gap:3px;font-weight:700}
.hud-timer.danger{color:#ef4444;animation:blink .5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ===== GAME AREA ===== */
.game-area{flex:1;display:flex;flex-direction:column;padding:10px 14px;min-height:0;position:relative;align-items:center}

/* ===== PROGRESS ===== */
.progress-wrap{width:100%;max-width:420px;display:flex;gap:6px;margin-bottom:12px;flex-shrink:0}
.progress-dot{flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:2px;transition:background .3s}
.progress-dot.done{background:#10b981}
.progress-dot.fail{background:#ef4444}

/* ===== LEVEL HEADER ===== */
.lvl-header{font-size:13px;color:#7a7a8a;margin-bottom:8px;text-align:center;flex-shrink:0}

/* ===== WORD GRID ===== */
.grid-wrap{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px 10px;width:100%;max-width:420px;flex-shrink:0;margin-bottom:8px}
.grid-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.grid-row:last-child{margin-bottom:0}
.grid-row .clue{font-size:12px;color:#7a7a8a;width:44px;flex-shrink:0;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;position:relative}
.grid-row .clue:hover{color:#a29bfe}
.grid-row .clue .full{display:none;position:absolute;right:50px;top:-4px;background:#1a1a2e;border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:4px 10px;font-size:11px;color:#e0dcd0;white-space:nowrap;z-index:10}
.grid-row .clue:hover .full{display:block}

.cells{display:flex;gap:4px;flex:1;justify-content:center}
.cell{width:30px;height:34px;border:1px solid rgba(255,255,255,.12);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#e0dcd0;background:rgba(255,255,255,.03);transition:all .15s;text-transform:lowercase;position:relative}
.cell.filled{background:rgba(16,185,129,.12);border-color:#10b981;color:#10b981}
.cell.wrong{background:rgba(239,68,68,.2);border-color:#ef4444;color:#ef4444;animation:cellShake .3s}
.cell.empty{cursor:pointer}
.cell.empty:hover{border-color:#6c5ce7;background:rgba(108,92,231,.08)}
.cell.given{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.15);color:#a29bfe;cursor:default}
.cell.active{animation:cellPulse 1s infinite}
@keyframes cellPulse{0%,100%{border-color:#6c5ce7}50%{border-color:#a29bfe}}
@keyframes cellShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}50%{transform:translateX(3px)}75%{transform:translateX(-2px)}}

/* ===== INPUT AREA ===== */
.input-area{display:flex;gap:8px;width:100%;max-width:420px;flex-shrink:0;margin-bottom:8px}
.input-area input{
    flex:1;padding:10px 14px;border:2px solid rgba(255,255,255,.1);border-radius:10px;
    background:rgba(255,255,255,.04);color:#e0dcd0;font-size:18px;font-weight:700;
    outline:none;font-family:inherit;text-align:center;letter-spacing:2px;text-transform:lowercase;
    transition:border-color .15s
}
.input-area input:focus{border-color:#6c5ce7}
.input-area input::placeholder{color:#4a4a5a;font-weight:400;font-size:14px}

.input-area .submit-btn{
    padding:10px 20px;background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;
    border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s;font-family:inherit
}
.input-area .submit-btn:hover{opacity:.9}
.input-area .submit-btn:active{transform:scale(.95)}
.input-area .submit-btn:disabled{opacity:.4;cursor:not-allowed}

/* ===== HINT BUTTON ===== */
.hint-area{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;flex-shrink:0;margin-bottom:4px}
.hint-btn{
    padding:5px 14px;border:1px solid rgba(255,255,255,.08);border-radius:8px;
    background:rgba(255,255,255,.03);color:#7a7a8a;font-size:12px;cursor:pointer;
    transition:all .15s;font-family:inherit
}
.hint-btn:hover{border-color:#6c5ce7;color:#a29bfe}
.hint-btn:active{transform:scale(.95)}
.hint-btn .cost{color:#fbbf24;font-size:10px}

/* ===== OPTIONS STRIP ===== */
.options-strip{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;flex-shrink:0;padding:4px 0 2px}
.opt-letter{
    width:32px;height:32px;border:1px solid rgba(255,255,255,.08);border-radius:6px;
    display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;
    background:rgba(255,255,255,.03);color:#e0dcd0;cursor:pointer;transition:all .1s
}
.opt-letter:hover{background:rgba(108,92,231,.15);border-color:#6c5ce7;transform:translateY(-2px)}
.opt-letter:active{transform:scale(.9)}
.opt-letter.used{opacity:.15;cursor:default;pointer-events:none}

/* ===== RESULT OVERLAY ===== */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:50;padding:24px}
.overlay.show{display:flex}
.overlay .emoji{font-size:64px;margin-bottom:6px}
.overlay .title{font-size:28px;font-weight:900;margin-bottom:2px}
.overlay .sub{font-size:14px;color:#7a7a8a;margin-bottom:16px;text-align:center;line-height:1.5}
.overlay .stats{display:flex;gap:16px;margin-bottom:18px;flex-wrap:wrap;justify-content:center}
.overlay .stats .s{text-align:center}
.overlay .stats .s .n{font-size:24px;font-weight:800;color:#a29bfe}
.overlay .stats .s .l{font-size:11px;color:#7a7a8a}
.overlay .acts{display:flex;flex-direction:column;gap:10px;width:100%;max-width:200px}

/* ===== SHOP ===== */
.shop-screen{padding:16px}
.shop-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.shop-header .back{padding:6px 14px;border:none;background:rgba(255,255,255,.05);color:#e0dcd0;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit}
.shop-header .back:hover{background:rgba(255,255,255,.1)}
.shop-header .cash{font-size:14px;color:#fbbf24;font-weight:700}
.shop-grid{display:grid;gap:10px;flex:1;align-content:start}
.shop-item{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:11px;padding:12px 14px}
.shop-item .icon{font-size:28px;flex-shrink:0}
.shop-item .info{flex:1}
.shop-item .info .name{font-size:14px;font-weight:700}
.shop-item .info .desc{font-size:11px;color:#7a7a8a;margin-top:1px}
.shop-item .buy{padding:7px 16px;border-radius:7px;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:inherit;flex-shrink:0;transition:opacity .15s}
.shop-item .buy:active{transform:scale(.93)}
.shop-item .buy.afford{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1a1a2e}
.shop-item .buy.broke{background:rgba(255,255,255,.08);color:#7a7a8a;cursor:not-allowed}
.shop-item .buy.owned{background:rgba(16,185,129,.15);color:#10b981;cursor:default}
.shop-foot{text-align:center;padding-top:8px;font-size:11px;color:#7a7a8a}

/* ===== TOAST ===== */
.toast{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.88);color:#e0dcd0;padding:6px 16px;border-radius:8px;font-size:13px;z-index:60;pointer-events:none;border:1px solid rgba(255,255,255,.06);opacity:0;transition:all .3s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%)translateY(-4px)}

/* ===== AUDIO TOGGLE ===== */
.audio-btn{
    position:absolute;top:52px;right:14px;z-index:5;
    width:32px;height:32px;border:1px solid rgba(255,255,255,.08);border-radius:8px;
    background:rgba(0,0,0,.3);color:#7a7a8a;cursor:pointer;font-size:14px;
    display:flex;align-items:center;justify-content:center;transition:all .15s
}
.audio-btn:hover{border-color:#6c5ce7;color:#a29bfe}

@media(max-height:640px){
.cell{width:26px;height:30px;font-size:15px}.grid-row .clue{font-size:11px;width:38px}.start h1{font-size:32px}.start .icon{font-size:60px}
}
@media(max-height:540px){
.cell{width:24px;height:26px;font-size:13px}.game-area{padding:6px 10px}.grid-wrap{padding:8px 8px}
}
</style>
</head>
<body>
<div id="game">

<!-- ===== START ===== -->
<div class="screen start active" id="s-start">
    <div class="icon">🧩</div>
    <h1>填词地牢</h1>
    <div class="sub">看释义，补字母，拼出完整单词</div>
    <div class="info">
        <div class="i"><div class="n" id="s-hp">❤️5</div><div class="l">生命</div></div>
        <div class="i"><div class="n">🧩3</div><div class="l">空位难度</div></div>
        <div class="i"><div class="n">🏰5</div><div class="l">单词/关</div></div>
    </div>
    <div class="btns">
        <button class="btn btn-primary" onclick="showScreen('s-shop');renderShop()">🏪 商店</button>
        <button class="btn btn-secondary" onclick="startGame()">🧩 开始填词</button>
    </div>
    <button class="audio-btn" id="audio-btn" onclick="toggleAudio()">🔇</button>
</div>

<!-- ===== SHOP ===== -->
<div class="screen shop-screen" id="s-shop">
    <div class="shop-header">
        <button class="back" onclick="showScreen('s-start')">←</button>
        <div class="cash">💰 <span id="shop-coins">0</span></div>
    </div>
    <h2 style="font-size:16px;font-weight:800;margin-bottom:10px">🏪 商店</h2>
    <div class="shop-grid" id="shop-grid"></div>
    <div class="shop-foot">击败怪物获得金币，在商店购买道具</div>
</div>

<!-- ===== GAME ===== -->
<div class="screen" id="s-game">
    <div class="hud">
        <div class="hud-lvl">🏰 第<span id="lvl-num">1</span>关</div>
        <div class="hud-hearts" id="hud-hearts"></div>
        <div class="hud-coins">💰 <span id="hud-coins">0</span></div>
        <div class="hud-timer" id="hud-timer">⏱<span id="timer-num">90</span></div>
    </div>

    <div class="game-area" id="game-area">
        <div class="progress-wrap" id="progress-wrap"></div>
        <div class="lvl-header" id="lvl-header">第 1 关 · 填入缺失的字母</div>

        <div class="grid-wrap" id="grid-wrap"></div>

        <!-- Input -->
        <div class="input-area">
            <input type="text" id="word-input" placeholder="输入完整单词…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
            <button class="submit-btn" id="submit-btn">↵ 确认</button>
        </div>

        <!-- Hint -->
        <div class="hint-area">
            <button class="hint-btn" onclick="giveHint()">💡 提示一个字母 <span class="cost">(2💰)</span></button>
            <button class="hint-btn" onclick="skipWord()">⚡ 跳过 <span class="cost">(3💰)</span></button>
            <button class="hint-btn" onclick="showOptions()">📋 备选 <span class="cost">(1💰)</span></button>
        </div>

        <div class="options-strip" id="options-strip"></div>
    </div>
</div>

<!-- ===== OVERLAYS ===== -->
<div class="overlay" id="o-win">
    <div class="emoji">🏆</div>
    <div class="title" style="color:#fbbf24">通关成功！</div>
    <div class="sub">你完成了全部关卡！</div>
    <div class="stats">
        <div class="s"><div class="n" id="w-score">0</div><div class="l">得分</div></div>
        <div class="s"><div class="n" id="w-acc">0%</div><div class="l">正确率</div></div>
        <div class="s"><div class="n" id="w-streak">🔥0</div><div class="l">最高连击</div></div>
    </div>
    <div class="acts"><button class="btn btn-primary" onclick="startGame()">🔄 再来一次</button></div>
</div>

<div class="overlay" id="o-lose">
    <div class="emoji">💀</div>
    <div class="title" style="color:#ef4444">倒下了</div>
    <div class="sub">完成了 <strong id="l-lvl">0</strong> 关 · 正确 <strong id="l-right">0</strong> 个</div>
    <div class="stats">
        <div class="s"><div class="n" id="l-score">0</div><div class="l">得分</div></div>
        <div class="s"><div class="n" id="l-acc">0%</div><div class="l">正确率</div></div>
        <div class="s"><div class="n" id="l-streak">🔥0</div><div class="l">最高连击</div></div>
    </div>
    <div class="acts">
        <button class="btn btn-primary" onclick="startGame()">🔄 重来</button>
        <button class="btn btn-secondary" onclick="showScreen('s-start')">🏠 主页</button>
    </div>
</div>

<div class="toast" id="toast"></div>
</div>

//  AUDIO ENGINE (procedural Web Audio)
// ============================================================
let audioCtx=null, audioEnabled=false, bgmGain=null, bgmOsc=null;

function initAudio(){
    if(audioCtx)return;
    try{
        audioCtx=new(window.AudioContext||window.webkitAudioContext)();
        audioEnabled=true;
        document.getElementById('audio-btn').textContent='🔊';
        startBGM();
    }catch(e){}
}
function toggleAudio(){
    if(!audioCtx){initAudio();return}
    audioEnabled=!audioEnabled;
    document.getElementById('audio-btn').textContent=audioEnabled?'🔊':'🔇';
    if(audioEnabled&&!bgmOsc)startBGM();
    else if(!audioEnabled&&bgmGain){bgmGain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+.5);setTimeout(()=>{bgmOsc=null},500)}
}

function startBGM(){
    if(!audioCtx||!audioEnabled)return;
    if(bgmOsc){bgmOsc.forEach(o=>{try{o.stop()}catch(e){}})}
    bgmOsc=[];
    bgmGain=audioCtx.createGain();bgmGain.gain.value=.035;bgmGain.connect(audioCtx.destination);
    // Simple ambient pad with 5th intervals
    const notes=[130.81,164.81,196,220]; // C3 E3 G3 A3
    notes.forEach(freq=>{
        const o=audioCtx.createOscillator();o.type='sine';
        o.frequency.value=freq;
        const g=audioCtx.createGain();g.gain.value=.03;
        o.connect(g);g.connect(bgmGain);
        o.start();
        // Slow LFO tremolo
        const lfo=audioCtx.createOscillator();lfo.frequency.value=.3+Math.random()*.2;
        const lg=audioCtx.createGain();lg.gain.value=.025;
        lfo.connect(lg);lg.connect(g.gain);
        lfo.start();
        bgmOsc.push(o);
    });
}

function sfx(type){
    if(!audioCtx||!audioEnabled)return;
    const c=audioCtx.currentTime;
    if(type==='correct'){
        // Ascending arpeggio
        [523.25,659.25,783.99,1046.5].forEach((f,i)=>{
            const o=audioCtx.createOscillator();o.type='sine';o.frequency.value=f;
            const g=audioCtx.createGain();g.gain.setValueAtTime(.12,c+i*.08);g.gain.exponentialRampToValueAtTime(.001,c+i*.08+.15);
            o.connect(g);g.connect(audioCtx.destination);o.start(c+i*.08);o.stop(c+i*.08+.15);
        });
    }else if(type==='wrong'){
        // Descending buzz
        const o=audioCtx.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(300,c);o.frequency.exponentialRampToValueAtTime(80,c+.2);
        const g=audioCtx.createGain();g.gain.setValueAtTime(.08,c);g.gain.exponentialRampToValueAtTime(.001,c+.2);
        o.connect(g);g.connect(audioCtx.destination);o.start(c);o.stop(c+.2);
    }else if(type==='click'){
        const o=audioCtx.createOscillator();o.type='sine';o.frequency.value=800;
        const g=audioCtx.createGain();g.gain.setValueAtTime(.05,c);g.gain.exponentialRampToValueAtTime(.001,c+.06);
        o.connect(g);g.connect(audioCtx.destination);o.start(c);o.stop(c+.06);
    }else if(type==='levelup'){
        // Victory fanfare
        [523.25,659.25,783.99,1046.5,1318.5].forEach((f,i)=>{
            const o=audioCtx.createOscillator();o.type='triangle';o.frequency.value=f;
            const g=audioCtx.createGain();g.gain.setValueAtTime(.1,c+i*.1);g.gain.exponentialRampToValueAtTime(.001,c+i*.1+.3);
            o.connect(g);g.connect(audioCtx.destination);o.start(c+i*.1);o.stop(c+i*.1+.3);
        });
    }else if(type==='fill'){
        const o=audioCtx.createOscillator();o.type='sine';o.frequency.value=660;
        const g=audioCtx.createGain();g.gain.setValueAtTime(.06,c);g.gain.exponentialRampToValueAtTime(.001,c+.08);
        o.connect(g);g.connect(audioCtx.destination);o.start(c);o.stop(c+.08);
    }else if(type==='buy'){
        [440,550,660].forEach((f,i)=>{
            const o=audioCtx.createOscillator();o.type='sine';o.frequency.value=f;
            const g=audioCtx.createGain();g.gain.setValueAtTime(.07,c+i*.06);g.gain.exponentialRampToValueAtTime(.001,c+i*.06+.1);
            o.connect(g);g.connect(audioCtx.destination);o.start(c+i*.06);o.stop(c+i*.06+.1);
        });
    }
}

// ============================================================
//  GAME LOGIC
// ============================================================
const $=id=>document.getElementById(id);
const WORDS_PER_LEVEL=5,MAX_HP=5,TOTAL_LEVELS=8,LEVEL_TIME=90;

const SHOP=[
    {i:'❤️',n:'生命药水',d:'恢复1颗心',c:3,effect:()=>{if(S.hp<S.maxHp){S.hp++;updateHUD();return 1}return 0}},
    {i:'⏰',n:'沙漏',d:'每关+20秒',c:2,effect:()=>{S.bonusTime+=20;return 1}},
    {i:'🛡️',n:'护盾',d:'答错不扣心',c:3,effect:()=>{S.shield++;return 1}},
    {i:'💡',n:'明灯',d:'直接揭示一个词',c:5,effect:()=>{S.autoReveal=true;return 1}},
];

let S={};
let timer=null;
let activeCell=null;
let currentWords=[];

function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}return r}

function init(){
    S={coins:5,hp:MAX_HP,maxHp:MAX_HP,streak:0,maxStreak:0,correct:0,wrong:0,total:0,shield:0,bonusTime:0,cBought:0,autoReveal:false};
    $('s-hp').textContent='❤️'+MAX_HP;
}
function showScreen(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    $(id).classList.add('active');
}
function showToast(m){
    const t=$('toast');t.textContent=m;t.classList.add('show');
    clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1600);
}

// ===== SHOP =====
function renderShop(){
    $('shop-coins').textContent=S.coins;
    const g=$('shop-grid');g.innerHTML='';
    SHOP.forEach((item,i)=>{
        const d=document.createElement('div');d.className='shop-item';
        const b=S[item.n]||0;const max=3;
        d.innerHTML=`<div class="icon">${item.i}</div><div class="info"><div class="name">${item.n}</div><div class="desc">${item.d}</div></div>
            <button class="buy ${S.coins>=item.c&&b<max?'afford':'broke'}" data-i="${i}">${b>=max?'已满':S.coins>=item.c?item.c+'💰':'没钱'}</button>`;
        const btn=d.querySelector('.buy');
        if(S.coins>=item.c&&b<max)btn.onclick=()=>{
            if(S.coins<item.c)return;S.coins-=item.c;
            if(!S[item.n])S[item.n]=0;S[item.n]++;
            sfx('buy');item.effect();renderShop();
        };
        g.appendChild(d);
    });
}

// ===== START GAME =====
function startGame(){
    S.lvl=0;S.hp=S.maxHp;S.streak=0;S.total=0;S.correct=0;S.wrong=0;
    document.getElementById('o-win').classList.remove('show');
    document.getElementById('o-lose').classList.remove('show');
    showScreen('s-game');
    startLevel();
}

function startLevel(){
    S.lvl++;S.lvlWords=[];
    if(S.lvl>TOTAL_LEVELS){
        sfx('levelup');
        document.getElementById('o-win').classList.add('show');
        $('w-score').textContent=S.coins;
        const a=S.total>0?Math.round(S.correct/S.total*100):0;$('w-acc').textContent=a+'%';
        $('w-streak').textContent='🔥'+S.maxStreak;return;
    }

    // Pick random words
    let available=WORDS.filter(w=>!S.usedWords||!S.usedWords.includes(w.en));
    if(available.length<WORDS_PER_LEVEL){S.usedWords=[];available=shuffle(WORDS).slice(0,WORDS_PER_LEVEL)}
    const picked=shuffle(available).slice(0,WORDS_PER_LEVEL);
    S.usedWords=(S.usedWords||[]).concat(picked.map(w=>w.en));
    S.lvlWords=picked;S.lvlIdx=0;S.autoReveal=false;

    $('lvl-num').textContent=S.lvl;
    $('lvl-header').textContent='第 '+S.lvl+' 关 · 填入缺失的字母';
    updateHUD();
    buildProgress();
    renderWord();
    startTimer(LEVEL_TIME+(S.bonusTime||0));

    sfx('levelup');
}

function updateHUD(){
    let h='';
    for(let i=0;i<S.maxHp;i++)h+=i<S.hp?'❤️':'<span class="lost">🖤</span>';
    $('hud-hearts').innerHTML=h;
    $('hud-coins').textContent=S.coins;
}

function buildProgress(){
    const w=$('progress-wrap');w.innerHTML='';
    for(let i=0;i<WORDS_PER_LEVEL;i++){
        const d=document.createElement('div');d.className='progress-dot';d.id='pd-'+i;w.appendChild(d);
    }
}

// ===== RENDER WORD =====
function renderWord(){
    if(S.lvlIdx>=WORDS_PER_LEVEL){
        // Level complete
        clearInterval(timer);
        sfx('levelup');
        startLevel();
        return;
    }
    if(S.hp<=0){gameOver();return;}

    const word=S.lvlWords[S.lvlIdx];
    const letters=word.en.split('');
    const len=letters.length;
    S.currentWord=word;

    // Determine how many blanks (progressive difficulty)
    const blankRatio=Math.min(.3+S.lvl*0.04,.65);
    const blankCount=Math.max(1,Math.floor(len*blankRatio));

    // Choose positions to blank out (avoid first letter always visible)
    let positions=letters.map((_,i)=>i).slice(1);
    const blanks=shuffle(positions).slice(0,blankCount);
    S.blanks=blanks;
    S.filled={};
    S.optionLetters=[];

    // Build grid
    const gw=$('grid-wrap');gw.innerHTML='';

    const row=document.createElement('div');row.className='grid-row';

    // Clue (Chinese meaning)
    const clue=document.createElement('div');clue.className='clue';
    clue.textContent=word.cn;
    const full=document.createElement('div');full.className='full';full.textContent=word.en+' = '+word.cn;
    clue.appendChild(full);
    row.appendChild(clue);

    // Cells
    const cells=document.createElement('div');cells.className='cells';
    S.cells={};
    letters.forEach((l,i)=>{
        const cell=document.createElement('div');
        cell.className='cell';
        if(blanks.includes(i)){
            cell.classList.add('empty');
            cell.textContent='_';
            if(!activeCell||i===blanks[0]){
                cell.classList.add('active');
                activeCell=i;
            }
            cell.onclick=()=>{
                activeCell=i;
                document.querySelectorAll('.cell.active').forEach(c=>c.classList.remove('active'));
                cell.classList.add('active');
                sfx('click');
            };
        } else {
            cell.classList.add('given');
            cell.textContent=l;
        }
        cell.dataset.idx=i;
        cell.dataset.letter=l;
        cells.appendChild(cell);
        S.cells[i]=cell;
    });
    row.appendChild(cells);
    gw.appendChild(row);

    // Clear input
    const inp=$('word-input');inp.value='';inp.focus();
    $('submit-btn').disabled=false;
    $('options-strip').innerHTML='';
    $('#options-strip').__shown=false;

    // Check auto-reveal
    if(S.autoReveal){
        S.autoReveal=false;
        setTimeout(()=>{revealLetter();},300);
    }

    updateProgress();
}

function updateProgress(){
    for(let i=0;i<WORDS_PER_LEVEL;i++){
        const d=$('pd-'+i);
        if(!d)continue;
        if(i<S.lvlIdx)d.className='progress-dot done';
        else if(i===S.lvlIdx)d.className='progress-dot';
        else d.className='progress-dot';
    }
}

// ===== INPUT & SUBMIT =====
const wordInput=$('word-input');
wordInput.addEventListener('keydown',e=>{
    if(e.key==='Enter')submitWord();
});
$('submit-btn').addEventListener('click',submitWord);

function submitWord(){
    if(!S.currentWord)return;
    const val=wordInput.value.trim().toLowerCase();
    if(!val){showToast('请输入单词');return}
    if(val===S.currentWord.en.toLowerCase()){
        // Correct!
        S.total++;S.correct++;S.streak++;
        if(S.streak>S.maxStreak)S.maxStreak=S.streak;
        const bonus=Math.min(3,Math.floor((S.timeLeft||0)/20));
        const coins=2+S.streak/3+bonus;
        S.coins+=Math.floor(coins);
        sfx('correct');
        // Fill in remaining blanks
        S.blanks.forEach(idx=>{
            const c=S.cells[idx];if(c){c.textContent=S.currentWord.en[idx];c.className='cell filled';}
        });
        $('pd-'+S.lvlIdx).className='progress-dot done';
        showToast('✅ 正确！+'+(Math.floor(coins))+'💰');
        updateHUD();
        S.lvlIdx++;
        setTimeout(renderWord,600);
    } else {
        // Wrong
        S.total++;S.wrong++;S.streak=0;
        if(S.shield>0){
            S.shield--;sfx('wrong');
            showToast('🛡️ 护盾挡住了伤害！');
            $('options-strip').innerHTML='';
            wordInput.value='';wordInput.focus();
            return;
        }
        S.hp--;
        sfx('wrong');
        updateHUD();
        wordInput.value='';
        // Shake input
        wordInput.style.borderColor='#ef4444';
        setTimeout(()=>wordInput.style.borderColor='',500);
        if(S.hp<=0){gameOver();return;}
        showToast('❌ 再想想…');
        // Show options after wrong attempt
        showOptions();
    }
}

// ===== TIMER =====
function startTimer(sec){
    clearInterval(timer);
    let t=sec;S.timeLeft=t;
    $('timer-num').textContent=t;
    const el=$('hud-timer');el.classList.remove('danger');
    timer=setInterval(()=>{
        t--;S.timeLeft=t;
        $('timer-num').textContent=t;
        if(t<=10)el.classList.add('danger');else el.classList.remove('danger');
        if(t<=0){
            clearInterval(timer);
            // Time up = lose HP for each remaining word
            const remaining=WORDS_PER_LEVEL-S.lvlIdx;
            S.hp-=Math.max(1,remaining-1);
            if(S.hp<=0)S.hp=0;
            updateHUD();
            sfx('wrong');
            if(S.hp<=0)gameOver();
            else{
                showToast('⏰ 时间到！剩余单词跳过');
                setTimeout(startLevel,800);
            }
        }
    },1000);
}

// ===== HELPERS =====
function giveHint(){
    if(S.coins<2){showToast('💰 金币不足');return}
    S.coins-=2;updateHUD();sfx('buy');
    revealLetter();
}

function revealLetter(){
    if(!S.currentWord||S.blanks.length===0)return;
    // Find first unfilled blank
    for(const idx of S.blanks){
        const c=S.cells[idx];
        if(c&&c.classList.contains('empty')){
            c.textContent=S.currentWord.en[idx];
            c.className='cell filled';
            c.classList.remove('empty');
            sfx('fill');
            showToast('💡 揭示：字母「'+S.currentWord.en[idx]+'」');
            // Remove from blanks
            S.blanks=S.blanks.filter(b=>b!==idx);
            return;
        }
    }
    showToast('💡 已经全填了');
}

function skipWord(){
    if(S.coins<3){showToast('💰 金币不足');return}
    S.coins-=3;updateHUD();sfx('buy');
    // Mark as wrong but skip
    S.total++;S.wrong++;
    $('pd-'+S.lvlIdx).className='progress-dot fail';
    showToast('⚡ 已跳过');
    S.lvlIdx++;
    setTimeout(renderWord,300);
}

function showOptions(){
    if(!S.currentWord)return;
    // Show 4 letter options including some correct ones
    const word=S.currentWord.en.toLowerCase();
    const blanks=S.blanks||[];
    const needed=[...new Set(blanks.map(i=>word[i]))];
    // Add 2-3 random letters
    const pool='abcdefghijklmnopqrstuvwxyz'.split('').filter(l=>!needed.includes(l));
    const randoms=shuffle(pool).slice(0,Math.max(2,4-needed.length));
    const all=shuffle([...needed,...randoms]);
    const strip=$('options-strip');strip.innerHTML='';
    all.forEach(l=>{
        const b=document.createElement('div');b.className='opt-letter';
        b.textContent=l;
        b.addEventListener('click',()=>{
            // Fill into first empty blank
            for(const idx of blanks){
                const c=S.cells[idx];
                if(c&&c.classList.contains('empty')){
                    if(l===word[idx]){
                        c.textContent=l;c.className='cell filled';c.classList.remove('empty');
                        S.blanks=S.blanks.filter(b=>b!==idx);
                        sfx('fill');
                        // Check if all filled
                        if(S.blanks.length===0){
                            // Auto-submit
                            wordInput.value=word;
                            setTimeout(submitWord,200);
                        }
                    } else {
                        sfx('wrong');
                        showToast('❌ 不对哦');
                    }
                    return;
                }
            }
        });
        strip.appendChild(b);
    });
    if(needed.length>0)sfx('click');
}

// ===== GAME OVER =====
function gameOver(){
    clearInterval(timer);
    $('o-lose').classList.add('show');
    $('l-lvl').textContent=S.lvl;
    $('l-right').textContent=S.correct;
    $('l-score').textContent=S.coins;
    const a=S.total>0?Math.round(S.correct/S.total*100):0;$('l-acc').textContent=a+'%';
    $('l-streak').textContent='🔥'+S.maxStreak;
    sfx('wrong');
}

// ===== INIT =====
init();
</script>
