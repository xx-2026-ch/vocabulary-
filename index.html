<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>背单词小游戏 — 沉浸式单词闯关</title>
    <meta name="description" content="免费的背单词小游戏，四选一单词挑战，内置四级/六级词库，支持自定词表导入。">
    <meta name="keywords" content="背单词, 单词游戏, 英语, 四六级, 单词闯关">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
    <style>
        :root {
            --bg: #f0f4f8; --card: #fff; --text: #1a202c; --text2: #4a5568;
            --border: #e2e8f0; --primary: #6c5ce7; --primary-hover: #5a4bd1;
            --primary-light: #f0eeff; --success: #10b981; --wrong: #ef4444;
            --shadow: 0 4px 24px rgba(0,0,0,.06); --radius: 16px; --radius-sm: 10px;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --text2: #94a3b8;
                --border: #334155; --primary-light: #1e1b4b;
                --shadow: 0 4px 24px rgba(0,0,0,.3);
            }
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body {
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,'Noto Sans SC',sans-serif;
            background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;
            transition:background .3s,color .3s;
        }

        header {
            background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;
            display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
        }
        .logo{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700;color:inherit;text-decoration:none}
        .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#6c5ce7,#a29bfe);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
        .logo span{background:linear-gradient(135deg,#6c5ce7,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        header nav{display:flex;gap:8px}
        header nav a{color:var(--text2);text-decoration:none;padding:6px 14px;border-radius:8px;font-size:14px;transition:background .2s,color .2s}
        header nav a:hover{background:var(--primary-light);color:var(--primary)}

        .container{max-width:640px;margin:0 auto;padding:40px 20px;flex:1;width:100%}

        /* ===== Start Screen ===== */
        .screen{display:none}
        .screen.active{display:block}

        .start-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:40px 32px;text-align:center}
        .start-card .big-icon{font-size:64px;margin-bottom:12px}
        .start-card h1{font-size:28px;font-weight:800;margin-bottom:6px}
        .start-card h1 span{background:linear-gradient(135deg,#6c5ce7,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .start-card p{color:var(--text2);font-size:15px;margin-bottom:24px;line-height:1.6}
        .start-card .sub{font-size:13px;color:var(--text2);margin-bottom:20px}

        .word-count-select{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
        .word-count-select button{
            padding:8px 20px;border:2px solid var(--border);background:transparent;color:var(--text2);
            border-radius:8px;cursor:pointer;font-size:14px;transition:all .2s
        }
        .word-count-select button:hover{border-color:var(--primary);color:var(--primary)}
        .word-count-select button.active{border-color:var(--primary);background:var(--primary);color:#fff}

        .difficulty-select{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
        .difficulty-select button{
            padding:8px 20px;border:2px solid var(--border);background:transparent;color:var(--text2);
            border-radius:8px;cursor:pointer;font-size:14px;transition:all .2s
        }
        .difficulty-select button:hover{border-color:var(--primary);color:var(--primary)}
        .difficulty-select button.active{border-color:var(--primary);background:var(--primary);color:#fff}

        .start-btn{
            padding:14px 48px;background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;
            border:none;border-radius:var(--radius-sm);font-size:18px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s
        }
        .start-btn:hover{opacity:.9}
        .start-btn:active{transform:scale(.98)}

        .custom-section{margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
        .custom-section .hint{font-size:13px;color:var(--text2);margin-bottom:8px}
        .custom-upload-btn{
            padding:6px 16px;border:1px solid var(--border);border-radius:6px;background:var(--card);
            color:var(--text2);font-size:13px;cursor:pointer;display:inline-block;transition:all .2s
        }
        .custom-upload-btn:hover{border-color:var(--primary);color:var(--primary)}
        .custom-badge{display:none;padding:4px 12px;background:var(--primary-light);border-radius:20px;font-size:12px;color:var(--primary);margin-left:8px}
        .custom-badge.visible{display:inline-block}
        #custom-input{display:none}

        /* ===== Game Screen ===== */
        .game-header{
            display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px
        }
        .game-header .stat{font-size:14px;font-weight:600}
        .game-header .stat span{color:var(--primary)}
        .progress-wrap{width:100%;height:6px;background:var(--border);border-radius:3px;margin-bottom:24px}
        .progress-fill{height:100%;background:linear-gradient(90deg,#6c5ce7,#a29bfe);border-radius:3px;transition:width .3s}

        .word-card{
            background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
            padding:48px 32px;text-align:center;margin-bottom:24px
        }
        .word-card .en{font-size:36px;font-weight:800;margin-bottom:8px;letter-spacing:-.5px}
        .word-card .ipa{font-size:15px;color:var(--text2);font-style:italic;margin-bottom:4px}
        .word-card .streak{font-size:14px;color:var(--primary);font-weight:600}
        .word-card .streak .fire{font-size:18px}

        .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:480px){.options{grid-template-columns:1fr}}

        .option-btn{
            padding:16px 20px;border:2px solid var(--border);background:var(--card);color:var(--text);
            border-radius:var(--radius-sm);font-size:16px;cursor:pointer;transition:all .15s;
            text-align:center;font-weight:500
        }
        .option-btn:hover{border-color:var(--primary);background:var(--primary-light);transform:translateY(-1px)}
        .option-btn:active{transform:scale(.97)}
        .option-btn.correct{background:var(--success);border-color:var(--success);color:#fff;animation:pulse .3s}
        .option-btn.wrong{background:var(--wrong);border-color:var(--wrong);color:#fff;animation:shake .3s}
        .option-btn.disabled{pointer-events:none;opacity:.7}

        @keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.03)}100%{transform:scale(1)}}
        @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

        .result-card{animation:fadeIn .3s}

        /* ===== Result Screen ===== */
        .result-card{
            background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
            padding:40px 32px;text-align:center
        }
        .result-card .big{font-size:56px;margin-bottom:8px}
        .result-card h2{font-size:24px;margin-bottom:4px}
        .result-card .score{font-size:48px;font-weight:800;color:var(--primary);margin:12px 0}
        .result-card .detail{color:var(--text2);font-size:15px;margin-bottom:4px;line-height:1.8}
        .result-card .detail strong{color:var(--text)}

        .wrong-list{margin-top:24px;text-align:left}
        .wrong-list h3{font-size:16px;margin-bottom:12px;color:var(--wrong)}
        .wrong-item{
            display:flex;justify-content:space-between;align-items:center;
            padding:10px 14px;background:var(--bg);border-radius:8px;margin-bottom:6px;
            font-size:14px;gap:10px
        }
        .wrong-item .en{font-weight:600}
        .wrong-item .cn{color:var(--text2)}

        .result-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:24px}
        .result-actions button{
            padding:12px 28px;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s
        }
        .btn-primary{background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;border:none}
        .btn-primary:hover{opacity:.9}
        .btn-secondary{background:transparent;color:var(--primary);border:2px solid var(--primary)}
        .btn-secondary:hover{background:var(--primary-light)}

        footer{
            text-align:center;padding:20px;color:var(--text2);font-size:13px;
            border-top:1px solid var(--border);background:var(--card);margin-top:20px
        }

        .toast{
            position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
            background:var(--text);color:var(--bg);padding:12px 24px;border-radius:var(--radius-sm);
            font-size:14px;opacity:0;transition:all .3s;pointer-events:none;z-index:999
        }
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    </style>
</head>
<body>

<header>
    <div class="logo"><div class="logo-icon">📖</div><span>单词闯关</span></div>
    <nav>
        <a href="#howto" id="howto-link">玩法</a>
    </nav>
</header>

<div class="container">
    <!-- ===== Start Screen ===== -->
    <div class="screen active" id="start-screen">
        <div class="start-card">
            <div class="big-icon">📖</div>
            <h1>单词 <span>闯关</span></h1>
            <p>看英文选中文，四选一挑战你的词汇量</p>
            <div class="sub">📚 内置四级/六级/考研词汇</div>

            <div style="font-size:14px;font-weight:600;color:var(--text2);margin-bottom:8px">题数</div>
            <div class="word-count-select" id="word-count">
                <button data-count="10">10</button>
                <button data-count="20" class="active">20</button>
                <button data-count="30">30</button>
                <button data-count="50">50</button>
            </div>

            <div style="font-size:14px;font-weight:600;color:var(--text2);margin-bottom:8px">难度</div>
            <div class="difficulty-select" id="difficulty">
                <button data-level="easy">🌱 简单</button>
                <button data-level="medium" class="active">🔥 中等</button>
                <button data-level="hard">💀 困难</button>
            </div>

            <button class="start-btn" id="start-btn">🚀 开始挑战</button>

            <div class="custom-section">
                <div class="hint">📂 有自己的词表？上传 CSV/TXT（每行：单词,释义）</div>
                <label class="custom-upload-btn" id="custom-label">📄 上传词表</label>
                <span class="custom-badge" id="custom-badge">✅ 已加载</span>
                <input type="file" id="custom-input" accept=".csv,.txt">
            </div>
        </div>
    </div>

    <!-- ===== Game Screen ===== -->
    <div class="screen" id="game-screen">
        <div class="game-header">
            <div class="stat"><span id="current-num">1</span>/<span id="total-num">20</span></div>
            <div class="stat">✅ <span id="correct-num">0</span> · ❌ <span id="wrong-num">0</span></div>
            <div class="stat">🔥 <span id="streak-num">0</span></div>
        </div>
        <div class="progress-wrap"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

        <div class="word-card">
            <div class="en" id="word-en">abandon</div>
            <div class="ipa" id="word-ipa">/əˈbændən/</div>
            <div class="streak" id="streak-display"></div>
        </div>

        <div class="options" id="options"></div>
    </div>

    <!-- ===== Result Screen ===== -->
    <div class="screen" id="result-screen">
        <div class="result-card">
            <div class="big" id="result-emoji">🎉</div>
            <h2 id="result-title">挑战完成！</h2>
            <div class="score" id="result-score">18/20</div>
            <div class="detail">正确率：<strong id="result-rate">90%</strong></div>
            <div class="detail">最长连击：<strong id="result-streak">🔥 5</strong></div>
            <div class="detail" id="result-grade" style="margin-top:8px;font-size:18px"></div>

            <div class="wrong-list" id="wrong-list" style="display:none">
                <h3>📝 需要复习的单词</h3>
                <div id="wrong-items"></div>
            </div>

            <div class="result-actions">
                <button class="btn-primary" id="retry-btn">🔄 再来一次</button>
                <button class="btn-secondary" id="home-btn">🏠 返回首页</button>
            </div>
        </div>
    </div>
</div>

<footer>
    <p>📖 单词闯关 · 免费背单词小游戏 · 纯本地运行</p>
</footer>

<div class="toast" id="toast"></div>

    const startScreen = document.getElementById('start-screen');
    const gameScreen = document.getElementById('game-screen');
    const resultScreen = document.getElementById('result-screen');
    const wordCountBtns = document.querySelectorAll('#word-count button');
    const difficultyBtns = document.querySelectorAll('#difficulty button');
    const startBtn = document.getElementById('start-btn');
    const retryBtn = document.getElementById('retry-btn');
    const homeBtn = document.getElementById('home-btn');
    const toast = document.getElementById('toast');

    const wordEn = document.getElementById('word-en');
    const wordIpa = document.getElementById('word-ipa');
    const optionsContainer = document.getElementById('options');
    const currentNum = document.getElementById('current-num');
    const totalNum = document.getElementById('total-num');
    const correctNum = document.getElementById('correct-num');
    const wrongNum = document.getElementById('wrong-num');
    const streakNum = document.getElementById('streak-num');
    const streakDisplay = document.getElementById('streak-display');
    const progressFill = document.getElementById('progress-fill');

    let selectedCount = 20;
    let selectedLevel = 'medium';
    let customWords = [];

    // Word count select
    wordCountBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            wordCountBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedCount = parseInt(btn.dataset.count);
        });
    });

    // Difficulty select
    difficultyBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            difficultyBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedLevel = btn.dataset.level;
        });
    });

    // Custom word list upload
    const customInput = document.getElementById('custom-input');
    const customBadge = document.getElementById('custom-badge');
    document.getElementById('custom-label').addEventListener('click', () => customInput.click());
    customInput.addEventListener('change', () => {
        if (!customInput.files.length) return;
        const file = customInput.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const text = e.target.result;
            const lines = text.trim().split('\n');
            customWords = [];
            for (const line of lines) {
                const parts = line.trim().split(',');
                if (parts.length >= 2) {
                    const en = parts[0].trim();
                    const cn = parts.slice(1).join(',').trim();
                    if (en && cn) customWords.push({ en, ipa: '', cn });
                }
            }
            if (customWords.length > 0) {
                customBadge.classList.add('visible');
                showToast('✅ 已加载 ' + customWords.length + ' 个自定义单词');
            } else {
                showToast('⚠️ 格式有误，请使用：单词,释义');
            }
        };
        reader.readAsText(file, 'UTF-8');
    });

    // ===== Start Game =====
    startBtn.addEventListener('click', startGame);

    function getWordBank() {
        if (customWords.length > 0) return customWords;
        const levelMap = { easy: 0, medium: 1, hard: 2 };
        const idx = levelMap[selectedLevel] || 1;
        // Divide the word bank into 3 tiers
        const total = WORD_BANK.length;
        const tierSize = Math.floor(total / 3);
        if (idx === 0) return WORD_BANK.slice(0, tierSize);
        if (idx === 1) return WORD_BANK.slice(tierSize, tierSize * 2);
        return WORD_BANK.slice(tierSize * 2);
    }

    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function startGame() {
        const bank = getWordBank();
        const count = Math.min(selectedCount, bank.length);
        const selected = shuffle(bank).slice(0, count);
        window.gameState = { words: selected, current: 0, correct: 0, wrong: 0, streak: 0, maxStreak: 0, wrongs: [] };

        startScreen.classList.remove('active');
        resultScreen.classList.remove('active');
        gameScreen.classList.add('active');
        totalNum.textContent = selected.length;
        showWord();
    }

    function showWord() {
        const state = window.gameState;
        if (state.current >= state.words.length) { showResult(); return; }

        const word = state.words[state.current];
        wordEn.textContent = word.en;
        wordIpa.textContent = word.ipa;

        currentNum.textContent = state.current + 1;
        correctNum.textContent = state.correct;
        wrongNum.textContent = state.wrong;
        streakNum.textContent = state.streak;
        progressFill.style.width = ((state.current / state.words.length) * 100) + '%';

        if (state.streak >= 3) {
            const fire = state.streak >= 5 ? '🔥🔥' : state.streak >= 10 ? '🔥🔥🔥' : '🔥';
            streakDisplay.innerHTML = `${fire} 连击 x${state.streak}`;
        } else {
            streakDisplay.innerHTML = '';
        }

        // Generate options
        const bank = getWordBank();
        const correctCn = word.cn;
        let distractors = shuffle(bank.filter(w => w.en !== word.en)).map(w => w.cn).slice(0, 3);
        while (distractors.length < 3) {
            distractors.push('未知');
        }
        const options = shuffle([correctCn, ...distractors]);

        optionsContainer.innerHTML = '';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.addEventListener('click', () => selectAnswer(btn, opt, correctCn));
            optionsContainer.appendChild(btn);
        });
    }

    function selectAnswer(btn, selected, correct) {
        const btns = optionsContainer.querySelectorAll('.option-btn');
        btns.forEach(b => b.classList.add('disabled'));
        const state = window.gameState;

        if (selected === correct) {
            btn.classList.add('correct');
            state.correct++;
            state.streak++;
            if (state.streak > state.maxStreak) state.maxStreak = state.streak;
        } else {
            btn.classList.add('wrong');
            state.wrong++;
            state.streak = 0;
            // Highlight correct
            btns.forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });
            state.wrongs.push({ en: state.words[state.current].en, cn: correct });
        }

        correctNum.textContent = state.correct;
        wrongNum.textContent = state.wrong;
        streakNum.textContent = state.streak;

        setTimeout(() => {
            state.current++;
            showWord();
        }, 800);
    }

    function showResult() {
        gameScreen.classList.remove('active');
        resultScreen.classList.add('active');

        const state = window.gameState;
        const total = state.words.length;
        const rate = Math.round((state.correct / total) * 100);

        // Emoji & title
        let emoji, title, grade;
        if (rate === 100) { emoji = '🏆'; title = '满分大神！'; grade = '🌟 完美通关！词汇大师！'; }
        else if (rate >= 90) { emoji = '🎉'; title = '太棒了！'; grade = '👏 非常优秀，再接再厉！'; }
        else if (rate >= 70) { emoji = '👍'; title = '不错！'; grade = '💪 继续努力，还能更好！'; }
        else if (rate >= 50) { emoji = '🤔'; title = '还需要加油'; grade = '📚 多复习几次吧！'; }
        else { emoji = '😅'; title = '要多多练习哦'; grade = '📖 试试降低难度或使用自定义词表'; }

        document.getElementById('result-emoji').textContent = emoji;
        document.getElementById('result-title').textContent = title;
        document.getElementById('result-score').textContent = `${state.correct}/${total}`;
        document.getElementById('result-rate').textContent = rate + '%';
        document.getElementById('result-streak').textContent = '🔥 ' + state.maxStreak;
        document.getElementById('result-grade').textContent = grade;

        // Wrong words
        const wrongList = document.getElementById('wrong-list');
        const wrongItems = document.getElementById('wrong-items');
        wrongItems.innerHTML = '';
        if (state.wrongs.length > 0) {
            wrongList.style.display = 'block';
            state.wrongs.forEach(w => {
                const div = document.createElement('div');
                div.className = 'wrong-item';
                div.innerHTML = `<span class="en">${w.en}</span><span class="cn">${w.cn}</span>`;
                wrongItems.appendChild(div);
            });
        } else {
            wrongList.style.display = 'none';
        }
    }

    retryBtn.addEventListener('click', () => {
        resultScreen.classList.remove('active');
        startGame();
    });

    homeBtn.addEventListener('click', () => {
        resultScreen.classList.remove('active');
        startScreen.classList.add('active');
    });

    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toast._timer);
        toast._timer = setTimeout(() => toast.classList.remove('show'), 2500);
    }
})();
</script>
</body>
</html>
